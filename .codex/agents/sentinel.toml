| MT body contains correct bonus-type vocabulary | `source.bonus_type` | Scan `live_state.tnc.messages` EN body ‚Äî FAIL if body uses vocabulary that contradicts the bonus_type: FC body must NOT contain "deposit match" or "deposit bonus"; Deposit body must NOT contain "free credit" or "free spin"; FS body must NOT contain "deposit" or "free credit". Cross-type vocabulary = wrong template applied to this promo. INCONCLUSIVE if tnc null |
| MT body 3-section structure | Implicit (all promos with MT) | Scan `live_state.tnc.messages` EN body ‚Äî WARNING if the body is missing the How to Redeem section or the closing T&C sentence. INCONCLUSIVE if tnc null |
| max_per_player / daily_max | `source.max_per_player`, `source.daily_max` | `live_state.detail.max_per_player` / `daily_max` ‚Äî WARNING if source sets a non-zero cap but live value is 0 or null (cap was not applied; players can claim unlimited). INCONCLUSIVE if detail missing |
| QP2 freespin_check | implicit ON for FS promos (QP2 only) | `live_state.detail.freespin_check` ‚Äî FAIL if bonus_type is Free Spin and `freespin_check` ‚âÝ true on QP2; this toggle gates whether the promo validates against actual FS usage. INCONCLUSIVE if field absent from detail |
