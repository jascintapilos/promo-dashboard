| rewards_validity_days | `source.rewards_validity_days` (claim window before claim) | `live_state.detail.reward_validity` ‚Äî WARNING if swapped with validity; see above |
| per-currency reward amounts | `source.per_currency_overrides` per currency (e.g. `{ SGD: { min_deposit: 150 } }`) | `live_state.detail.per_currency_overrides` ‚Äî keyed by currency name (MYR/SGD/IDR/THB). For each currency present in `source.per_currency_overrides`, compare `min_deposit`, `max_bonus`, `bonus_rate`, `free_credit_amount` against the matching key in `live_state.detail.per_currency_overrides`. FAIL if a value differs. INCONCLUSIVE only if `live_state.detail.per_currency_overrides` is absent from the bundle entirely. If `source.per_currency_overrides` is empty `{}`, skip this check. |
| provider | `source.parsed.fs_provider` (FS); Layer-1 exclusion list (Dep/FC) | `live_state.detail.game_provider_ids` / `game_provider_codes` |
| T&C hyperlink | implicit (sentence 11 only) | `live_state.tnc.checks.sentence_11_has_link` (must be true) |
| brand placeholder | `:brandname` (QPRO) or `:merchantname` (QP2) | scan `live_state.tnc.messages` / MT body for literal hardcoded brand names |
| Category sub-exclusion in T&C | When `source.instructions.categories_only` is set AND `source.bonus_type = "Deposit"`, check EN + ZH MT body for the correct sub-exclusion phrase per category: **LC/LIVE CASINO** ‚Üí EN `"Blackjack"` / ZH `"‰∫åÂçÅ‰∏ÄÁÇπ"`; **SLOTS/SLOT** ‚Üí EN `"Table games"` + `"Arcade games"` / ZH `"Ê°åÈù¢Ê∏∏Êàè"` + `"Ë°óÊú∫"`; **SPORTS** ‚Üí EN `"Virtual Sports"` + `"Number Games"` / ZH `"ËôöÊãü‰ΩìËÇ≤"` + `"Êï∞Â≠óÊ∏∏Êàè"`. FAIL if the category is set but its required exclusion phrase is absent from the body. INCONCLUSIVE if tnc block is null. |
| MT body numeric values match source | `source.parsed.bonus_rate_pct`, `max_bonus`, `min_deposit`, `to_multiplier` | Scan `live_state.tnc.messages` EN body for numeric mentions ‚Äî the rate (as %), max bonus amount, min deposit amount, TO multiplier (as Nx). FAIL if a number appears in the body but does not match source.parsed. WARNING if a source value is absent from the body entirely. INCONCLUSIVE if `live_state.tnc` is null. |
| ZH body numeric consistency | Derived from EN body values | Scan `live_state.tnc.messages` ZH locale body ‚Äî every numeric value (rate %, bonus amount, min deposit, TO) must match the EN body. FAIL if ZH shows a different number. INCONCLUSIVE if tnc block is null. |
| No HTML entity artifacts in MT body | N/A | Scan all locale bodies in `live_state.tnc.messages` for raw HTML entities: `&amp;`, `&mdash;`, `&rsquo;`, `&nbsp;`, `&#39;`, `&ldquo;`, `&rdquo;`. FAIL if any appear ‚Äî they render as literal characters to the player (e.g. player sees "&amp;" instead of "&"). INCONCLUSIVE if tnc block is null. |
| FS spin count ‚â§ 88 | `source.parsed.spin_count` (FS only) | FS round field in `live_state.detail` ‚Äî FAIL if spin_count > 88; platform maximum is 88 spins per promo. INCONCLUSIVE if live_state.detail is null |
| FS per-spin value ‚â• 0.50 | `source.parsed.value_per_spin` (FS only) | `live_state.detail.per_currency_overrides` per currency or platform equivalent ‚Äî FAIL if any currency's per-spin value < 0.50; platform minimum is 0.50/spin. INCONCLUSIVE if detail missing |
| TO multiplier within platform range | `source.parsed.to_multiplier` and `platform` field in bundle | `live_state.detail.to_multiplier` ‚Äî WARNING if TO is outside expected range for REL_/RET_ promos: QPRO/WS1 = 10‚Äì12x, QP2 = 12‚Äì15x. WELC_ promos (code starts with WELC_) are exempt. INCONCLUSIVE if detail missing |
